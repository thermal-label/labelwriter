name: Hardware verification
description: Report your testing results for an expected LabelWriter device — works, partial, or broken.
title: "Hardware: [Device name] ([PID])"
labels: ["hardware"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to test! Fill in what you can — even partial results help.
        Run `labelwriter list` and `labelwriter print text "test"` to get started.

  - type: dropdown
    id: result
    attributes:
      label: Result
      description: What was the overall outcome?
      options:
        - "✅ Works perfectly"
        - "⚠️ Partially works"
        - "❌ Does not work"
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Device model
      placeholder: "e.g. LabelWriter 450 Turbo"
    validations:
      required: true

  - type: input
    id: pid
    attributes:
      label: USB PID
      description: Find it with `lsusb | grep -i dymo` or Device Manager on Windows.
      placeholder: "e.g. 0x002A"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
      multiple: false
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node version
      placeholder: "e.g. v24.0.0  (run: node -v)"
    validations:
      required: true

  - type: input
    id: pkg_version
    attributes:
      label: Package version
      placeholder: "e.g. 0.1.0  (run: pnpm list @thermal-label/labelwriter-node)"
    validations:
      required: true

  - type: checkboxes
    id: tests
    attributes:
      label: Tests run
      options:
        - label: "`labelwriter list` — device appears in the list"
        - label: "`labelwriter print text \"test\"` — label printed successfully"
        - label: "`labelwriter status` — returned valid status"
        - label: "`labelwriter print image` — image label printed successfully"

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Quirks, workarounds, partial failure details, or anything else relevant.
      placeholder: "e.g. Required Zadig on Windows, status command times out after first print, 550 series NFC error with non-Dymo labels…"
