name: Feature request
description: Suggest a new feature or improvement to an existing one.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: what
    attributes:
      label: What would you like?
      description: Describe the feature or improvement clearly.
      placeholder: "e.g. A `copies` option in the web package that repeats the print stream without reconnecting…"
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why is this useful?
      description: What problem does it solve? Who benefits, and in what context?
    validations:
      required: true

  - type: dropdown
    id: packages
    attributes:
      label: Relevant package(s)
      multiple: true
      options:
        - "@thermal-label/labelwriter-node"
        - "@thermal-label/labelwriter-cli"
        - "@thermal-label/labelwriter-web"
        - "@thermal-label/labelwriter-core"
        - "Not sure / all packages"

  - type: textarea
    id: api
    attributes:
      label: Proposed API or behaviour
      description: If relevant, sketch what the call site might look like.
      render: typescript
      placeholder: |
        await printer.printText("Hello", { copies: 3 });

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, or other ways to achieve the same thing.
